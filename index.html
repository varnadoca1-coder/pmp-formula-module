<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PMP Formula Canvas Module ŌĆö IT Project Management</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --color-bg: #ffffff;
    --color-bg-secondary: #f7f7f5;
    --color-bg-tertiary: #f0eeea;
    --color-bg-info: #e6f1fb;
    --color-bg-success: #eaf3de;
    --color-bg-danger: #fcebeb;
    --color-bg-warning: #faeeda;
    --color-text-primary: #1a1a18;
    --color-text-secondary: #6b6b67;
    --color-text-info: #185fa5;
    --color-text-success: #3b6d11;
    --color-text-danger: #a32d2d;
    --color-border: rgba(0,0,0,0.12);
    --color-border-hover: rgba(0,0,0,0.22);
    --color-border-info: rgba(24,95,165,0.4);
    --color-border-success: rgba(59,109,17,0.4);
    --color-border-danger: rgba(163,45,45,0.4);
    --radius-md: 8px;
    --radius-lg: 12px;
    --font-sans: system-ui, -apple-system, 'Segoe UI', sans-serif;
    --font-mono: 'Menlo', 'Consolas', 'Monaco', monospace;
    --navy: #1B3A6B;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --color-bg: #1c1c1a;
      --color-bg-secondary: #252523;
      --color-bg-tertiary: #2e2e2b;
      --color-bg-info: #0c2a4a;
      --color-bg-success: #182e08;
      --color-bg-danger: #2e1212;
      --color-bg-warning: #2e1e06;
      --color-text-primary: #f0eeea;
      --color-text-secondary: #9a9a94;
      --color-text-info: #85b7eb;
      --color-text-success: #97c459;
      --color-text-danger: #f09595;
      --color-border: rgba(255,255,255,0.12);
      --color-border-hover: rgba(255,255,255,0.22);
      --color-border-info: rgba(133,183,235,0.4);
      --color-border-success: rgba(151,196,89,0.4);
      --color-border-danger: rgba(240,149,149,0.4);
    }
  }

  body {
    font-family: var(--font-sans);
    background: var(--color-bg-tertiary);
    color: var(--color-text-primary);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .app {
    max-width: 900px;
    margin: 0 auto;
    background: var(--color-bg-tertiary);
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
    padding-bottom: 1rem;
    border-bottom: 0.5px solid var(--color-border);
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo {
    width: 40px; height: 40px;
    border-radius: var(--radius-md);
    background: var(--navy);
    display: flex; align-items: center; justify-content: center;
  }
  .logo i { color: #fff; font-size: 20px; }
  .badge-title {
    font-size: 11px; font-weight: 500; letter-spacing: .08em;
    text-transform: uppercase; color: var(--color-text-secondary); margin-bottom: 2px;
  }
  .main-title { font-size: 20px; font-weight: 500; color: var(--color-text-primary); }
  .ai-pill {
    font-size: 12px; font-weight: 500; padding: 5px 14px;
    border-radius: 20px; background: var(--color-bg-success);
    color: var(--color-text-success); display: flex; align-items: center; gap: 6px;
  }

  /* Tabs */
  .tab-bar {
    display: flex; gap: 4px; margin-bottom: 1.25rem;
    overflow-x: auto; padding-bottom: 2px;
  }
  .tab {
    padding: 7px 14px; border-radius: var(--radius-md);
    border: 0.5px solid transparent; font-size: 13px; font-weight: 500;
    cursor: pointer; white-space: nowrap; color: var(--color-text-secondary);
    background: transparent; transition: all .15s; font-family: var(--font-sans);
    display: flex; align-items: center; gap: 6px;
  }
  .tab.active {
    background: var(--color-bg); border-color: var(--color-border-hover);
    color: var(--color-text-primary);
  }
  .tab:hover:not(.active) { background: var(--color-bg-secondary); }

  /* Grid layouts */
  .canvas-two { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .canvas-one { display: grid; grid-template-columns: 1fr; gap: 1rem; }
  @media (max-width: 640px) { .canvas-two { grid-template-columns: 1fr; } }

  /* Cards */
  .card {
    background: var(--color-bg);
    border: 0.5px solid var(--color-border);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
  }
  .card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
  .card-icon { font-size: 16px; color: var(--color-text-secondary); }
  .card-title { font-size: 14px; font-weight: 500; color: var(--color-text-primary); }
  .card-sub { font-size: 12px; color: var(--color-text-secondary); }

  /* Formula list */
  .formula-grid { display: flex; flex-direction: column; gap: 6px; max-height: 520px; overflow-y: auto; }
  .formula-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 10px; border-radius: var(--radius-md);
    border: 0.5px solid var(--color-border); cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .formula-row:hover, .formula-row.active {
    border-color: var(--color-border-info); background: var(--color-bg-info);
  }
  .formula-row.active .fml-name { color: var(--color-text-info); }
  .fml-left { display: flex; flex-direction: column; gap: 2px; }
  .fml-name { font-size: 13px; font-weight: 500; color: var(--color-text-primary); }
  .fml-eq { font-size: 11px; color: var(--color-text-secondary); font-family: var(--font-mono); }
  .fml-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 500; white-space: nowrap; }
  .badge-ev    { background: #e6f1fb; color: #185fa5; }
  .badge-time  { background: #eaf3de; color: #3b6d11; }
  .badge-cost  { background: #faeeda; color: #854f0b; }
  .badge-risk  { background: #fbeaf0; color: #993556; }
  .badge-comm  { background: #eeedfe; color: #3c3489; }
  .badge-proc  { background: #e1f5ee; color: #0f6e56; }

  /* Detail panel */
  .detail-formula {
    font-size: 17px; font-weight: 500; font-family: var(--font-mono);
    color: var(--color-text-primary); text-align: center;
    padding: 14px; background: var(--color-bg-secondary);
    border: 0.5px solid var(--color-border); border-radius: var(--radius-md); margin-bottom: 10px;
  }
  .detail-vars { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 10px; }
  .var-item {
    display: flex; flex-direction: column; gap: 2px;
    padding: 6px 8px; border-radius: var(--radius-md);
    background: var(--color-bg-secondary); border: 0.5px solid var(--color-border);
  }
  .var-abbr { font-size: 11px; font-weight: 500; font-family: var(--font-mono); color: var(--color-text-info); }
  .var-full { font-size: 11px; color: var(--color-text-secondary); }
  .detail-box {
    background: var(--color-bg-secondary); border-radius: var(--radius-md);
    padding: 10px 12px; margin-bottom: 10px;
  }
  .detail-tip-label {
    font-size: 10px; font-weight: 500; text-transform: uppercase;
    letter-spacing: .06em; color: var(--color-text-secondary); margin-bottom: 5px;
  }
  .detail-tip { font-size: 12px; color: var(--color-text-secondary); line-height: 1.6; }

  /* Buttons */
  .btn {
    padding: 7px 16px; border-radius: var(--radius-md);
    border: 0.5px solid var(--color-border-hover);
    background: var(--color-bg); color: var(--color-text-primary);
    font-size: 13px; cursor: pointer; font-family: var(--font-sans);
    transition: all .15s; display: inline-flex; align-items: center; gap: 6px;
  }
  .btn:hover { background: var(--color-bg-secondary); }
  .btn.primary { background: var(--navy); border-color: var(--navy); color: #fff; }
  .btn.primary:hover { opacity: .88; }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }

  /* Calculator */
  .calc-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .calc-label { font-size: 12px; color: var(--color-text-secondary); }
  .calc-input {
    flex: 1; border: 0.5px solid var(--color-border-hover);
    border-radius: var(--radius-md); padding: 7px 10px;
    font-size: 13px; background: var(--color-bg);
    color: var(--color-text-primary); font-family: var(--font-sans);
  }
  .calc-input:focus { outline: none; border-color: var(--color-border-info); }
  .result-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 7px 10px; border-radius: var(--radius-md);
    border: 0.5px solid var(--color-border); margin-bottom: 6px;
  }
  .result-abbr { font-size: 11px; font-weight: 500; font-family: var(--font-mono); color: var(--color-text-secondary); min-width: 40px; }
  .result-label-txt { font-size: 12px; color: var(--color-text-secondary); }
  .result-val { font-size: 15px; font-weight: 500; font-family: var(--font-mono); }
  .good { color: var(--color-text-success); }
  .bad  { color: var(--color-text-danger); }

  /* Quiz */
  .quiz-q { font-size: 14px; font-weight: 500; color: var(--color-text-primary); line-height: 1.6; margin-bottom: 14px; }
  .quiz-opts { display: flex; flex-direction: column; gap: 7px; margin-bottom: 12px; }
  .quiz-opt {
    padding: 9px 14px; border-radius: var(--radius-md);
    border: 0.5px solid var(--color-border); font-size: 13px;
    cursor: pointer; text-align: left; background: var(--color-bg);
    color: var(--color-text-primary); transition: all .15s;
    font-family: var(--font-sans); width: 100%;
  }
  .quiz-opt:hover:not(:disabled) { border-color: var(--color-border-hover); background: var(--color-bg-secondary); }
  .quiz-opt.correct { background: var(--color-bg-success); border-color: var(--color-border-success); color: var(--color-text-success); }
  .quiz-opt.wrong   { background: var(--color-bg-danger);  border-color: var(--color-border-danger);  color: var(--color-text-danger); }
  .quiz-opt:disabled { cursor: default; }
  .quiz-feedback {
    font-size: 13px; line-height: 1.6; padding: 10px 12px;
    border-radius: var(--radius-md); background: var(--color-bg-secondary);
    color: var(--color-text-secondary); margin-bottom: 10px;
  }
  .progress-bar { height: 4px; background: var(--color-bg-secondary); border-radius: 4px; overflow: hidden; margin-bottom: 4px; }
  .progress-fill { height: 100%; background: var(--navy); border-radius: 4px; transition: width .4s; }
  .progress-label { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 1rem; }

  /* Cheat sheet */
  .cheat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1rem; }
  @media (max-width: 500px) { .cheat-grid { grid-template-columns: 1fr; } }
  .cs-cat { border: 0.5px solid var(--color-border); border-radius: var(--radius-md); padding: 10px; }
  .cs-cat-title {
    font-size: 10px; font-weight: 500; text-transform: uppercase;
    letter-spacing: .06em; color: var(--color-text-secondary); margin-bottom: 8px;
  }
  .cs-item {
    display: flex; align-items: baseline; justify-content: space-between;
    padding: 3px 0; border-bottom: 0.5px solid var(--color-border);
  }
  .cs-item:last-child { border-bottom: none; }
  .cs-abbr { font-size: 11px; font-weight: 500; font-family: var(--font-mono); color: var(--color-text-primary); }
  .cs-eq   { font-size: 10px; font-family: var(--font-mono); color: var(--color-text-secondary); }
  .rules-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  @media (max-width: 500px) { .rules-grid { grid-template-columns: 1fr; } }
  .rule-item {
    font-size: 11px; padding: 5px 8px; border-radius: var(--radius-md);
    border: 0.5px solid var(--color-border);
  }

  /* AI tutor */
  .ai-box { border: 0.5px solid var(--color-border); border-radius: var(--radius-lg); overflow: hidden; }
  .ai-top {
    background: var(--color-bg-secondary); padding: 10px 14px;
    display: flex; align-items: center; gap: 8px;
    border-bottom: 0.5px solid var(--color-border);
  }
  .ai-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--navy); }
  .ai-label { font-size: 12px; color: var(--color-text-secondary); }
  .ai-body { padding: 14px; min-height: 280px; max-height: 380px; overflow-y: auto; }
  .ai-bubble {
    display: flex; gap: 8px; align-items: flex-start; margin-bottom: 12px;
  }
  .ai-bubble.user { flex-direction: row-reverse; }
  .ai-avatar {
    width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 12px;
  }
  .ai-avatar.bot { background: var(--navy); color: #fff; }
  .ai-avatar.user { background: var(--color-bg-secondary); color: var(--color-text-secondary); }
  .ai-text {
    max-width: 85%; padding: 9px 13px; border-radius: var(--radius-md);
    font-size: 13px; line-height: 1.6;
  }
  .ai-text.bot { background: var(--color-bg-secondary); color: var(--color-text-primary); }
  .ai-text.user { background: var(--navy); color: #fff; }
  .ai-input-row {
    display: flex; gap: 6px; padding: 10px 14px;
    border-top: 0.5px solid var(--color-border); background: var(--color-bg);
  }
  .ai-input {
    flex: 1; border: 0.5px solid var(--color-border-hover);
    border-radius: var(--radius-md); padding: 7px 10px;
    font-size: 13px; background: var(--color-bg);
    color: var(--color-text-primary); font-family: var(--font-sans);
  }
  .ai-input:focus { outline: none; border-color: var(--color-border-info); }
  .quick-btns { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }

  /* Stats */
  .stats-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 12px; }
  .stat-card { background: var(--color-bg-secondary); border-radius: var(--radius-md); padding: 10px; text-align: center; }
  .stat-num { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
  .stat-lbl { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }

  /* Typing animation */
  .typing { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--color-text-secondary); animation: bounce .8s infinite; }
  .dot:nth-child(2) { animation-delay: .15s; }
  .dot:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }

  /* Result completion screen */
  .result-screen { text-align: center; padding: 2.5rem 0; }
  .result-pct { font-size: 56px; font-weight: 500; font-family: var(--font-mono); }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="logo"><i class="ti ti-chart-gantt"></i></div>
      <div>
        <div class="badge-title">IT Project Management ┬Ę PMP Exam Prep</div>
        <div class="main-title">Formula Canvas Module</div>
      </div>
    </div>
    <div class="ai-pill"><i class="ti ti-brain"></i> AI Tutor Active</div>
  </div>

  <!-- Tab Bar -->
  <div class="tab-bar" id="tabBar"></div>

  <!-- Panel -->
  <div id="panel"></div>

</div>

<script>
/* ŌöĆŌöĆŌöĆ DATA ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
const TABS = [
  {id:'formulas',    label:'Formula Library',  icon:'ti-math-function'},
  {id:'calculator',  label:'EV Calculator',    icon:'ti-calculator'},
  {id:'quiz',        label:'Practice Quiz',    icon:'ti-pencil'},
  {id:'cheatsheet',  label:'Cheat Sheet',      icon:'ti-file-description'},
  {id:'ai',          label:'AI Tutor',         icon:'ti-message-chatbot'},
];

const CAT_LABELS = {ev:'Earned Value',time:'Schedule',comm:'Communication',risk:'Risk',proc:'Procurement',cost:'Cost/Finance'};
const CAT_CLASS  = {ev:'badge-ev',time:'badge-time',comm:'badge-comm',risk:'badge-risk',proc:'badge-proc',cost:'badge-cost'};

const FORMULAS = [
  {name:'Earned Value (EV)',             eq:'EV = BAC ├Ś % Complete',                         cat:'ev',   tip:'EV is the budgeted cost of work actually performed. Always calculated as a percentage of BAC.',                                               vars:[{a:'EV',f:'Earned Value'},{a:'BAC',f:'Budget at Completion'},{a:'%C',f:'Percent Complete'}]},
  {name:'Planned Value (PV)',            eq:'PV = BAC ├Ś % Scheduled',                        cat:'ev',   tip:'PV is what you planned to spend by now. Compare with EV to determine schedule performance.',                                                vars:[{a:'PV',f:'Planned Value'},{a:'BAC',f:'Budget at Completion'}]},
  {name:'Actual Cost (AC)',              eq:'AC = Actual costs incurred',                     cat:'ev',   tip:'AC is the real money spent to accomplish work. Track this from accounting systems.',                                                        vars:[{a:'AC',f:'Actual Cost'}]},
  {name:'Cost Variance (CV)',            eq:'CV = EV ŌłÆ AC',                                  cat:'ev',   tip:'Positive = under budget. Negative = over budget. Critical exam flag: negative CV is bad!',                                                  vars:[{a:'CV',f:'Cost Variance'},{a:'EV',f:'Earned Value'},{a:'AC',f:'Actual Cost'}]},
  {name:'Schedule Variance (SV)',        eq:'SV = EV ŌłÆ PV',                                  cat:'ev',   tip:'Positive = ahead of schedule. Negative = behind schedule. SV ŌåÆ 0 at project end.',                                                         vars:[{a:'SV',f:'Schedule Variance'},{a:'EV',f:'Earned Value'},{a:'PV',f:'Planned Value'}]},
  {name:'Cost Performance Index (CPI)', eq:'CPI = EV / AC',                                  cat:'ev',   tip:'CPI > 1: good (getting more value per dollar). CPI < 1: bad. The most critical EV index!',                                                 vars:[{a:'CPI',f:'Cost Perf. Index'},{a:'EV',f:'Earned Value'},{a:'AC',f:'Actual Cost'}]},
  {name:'Schedule Perf. Index (SPI)',    eq:'SPI = EV / PV',                                  cat:'ev',   tip:'SPI > 1: ahead of schedule. SPI < 1: behind. SPI becomes 1.0 at project completion.',                                                      vars:[{a:'SPI',f:'Schedule Perf. Index'},{a:'EV',f:'Earned Value'},{a:'PV',f:'Planned Value'}]},
  {name:'Estimate at Completion (EAC)', eq:'EAC = BAC / CPI',                                 cat:'ev',   tip:'Most common EAC formula. Assumes past CPI performance will continue for remaining work.',                                                   vars:[{a:'EAC',f:'Estimate at Completion'},{a:'BAC',f:'Budget at Completion'},{a:'CPI',f:'Cost Perf. Index'}]},
  {name:'EAC (re-estimate)',             eq:'EAC = AC + ETC',                                 cat:'ev',   tip:'Use when original estimate is fundamentally flawed and you re-estimate remaining work fresh.',                                               vars:[{a:'EAC',f:'Estimate at Completion'},{a:'AC',f:'Actual Cost'},{a:'ETC',f:'Estimate to Complete'}]},
  {name:'EAC (combined CPI┬ĘSPI)',        eq:'EAC = AC + [(BACŌłÆEV)/(CPI├ŚSPI)]',               cat:'ev',   tip:'Use when schedule efficiency is affecting costs ŌĆö common in IT projects with staff under pressure.',                                         vars:[{a:'EAC',f:'Estimate at Completion'},{a:'CPI',f:'Cost Perf. Index'},{a:'SPI',f:'Schedule Perf. Index'}]},
  {name:'Estimate to Complete (ETC)',    eq:'ETC = EAC ŌłÆ AC',                                 cat:'ev',   tip:'How much more money do we need? ETC is the remaining budget from now to project end.',                                                       vars:[{a:'ETC',f:'Estimate to Complete'},{a:'EAC',f:'Estimate at Completion'},{a:'AC',f:'Actual Cost'}]},
  {name:'Variance at Completion (VAC)', eq:'VAC = BAC ŌłÆ EAC',                                 cat:'ev',   tip:'Predicted over/under run at completion. Positive VAC = will finish under budget.',                                                          vars:[{a:'VAC',f:'Variance at Completion'},{a:'BAC',f:'Budget at Completion'},{a:'EAC',f:'Estimate at Completion'}]},
  {name:'To-Complete Perf. Index (TCPI)',eq:'TCPI = (BACŌłÆEV)/(BACŌłÆAC)',                       cat:'ev',   tip:'Efficiency needed to finish within budget. TCPI > 1 means you need to work more efficiently.',                                               vars:[{a:'TCPI',f:'TCPI'},{a:'BAC',f:'Budget at Completion'},{a:'EV',f:'Earned Value'},{a:'AC',f:'Actual Cost'}]},
  {name:'PERT Estimate',                 eq:'E = (O + 4M + P) / 6',                          cat:'time', tip:'Weighted average that accounts for risk. The "4M" weight reflects that realistic estimates are most likely.',                                vars:[{a:'O',f:'Optimistic'},{a:'M',f:'Most Likely'},{a:'P',f:'Pessimistic'},{a:'E',f:'Expected Duration'}]},
  {name:'PERT Standard Deviation',       eq:'Žā = (P ŌłÆ O) / 6',                               cat:'time', tip:'Measures uncertainty range. Larger Žā = more risk. Use to build confidence intervals.',                                                       vars:[{a:'Žā',f:'Standard Deviation'},{a:'P',f:'Pessimistic'},{a:'O',f:'Optimistic'}]},
  {name:'PERT Variance',                 eq:'Žā┬▓ = [(P ŌłÆ O) / 6]┬▓',                           cat:'time', tip:'Sum variances (not std devs) across critical path activities to get total project variance.',                                                vars:[{a:'Žā┬▓',f:'Variance'},{a:'P',f:'Pessimistic'},{a:'O',f:'Optimistic'}]},
  {name:'Float (Total Float)',           eq:'Float = LS ŌłÆ ES  or  LF ŌłÆ EF',                  cat:'time', tip:'Amount of time an activity can be delayed without delaying the project. Critical path = 0 float.',                                          vars:[{a:'LS',f:'Late Start'},{a:'ES',f:'Early Start'},{a:'LF',f:'Late Finish'},{a:'EF',f:'Early Finish'}]},
  {name:'Communication Channels',       eq:'N(NŌłÆ1) / 2',                                     cat:'comm', tip:'N = number of stakeholders. Adding one person dramatically increases complexity ŌĆö key exam concept!',                                         vars:[{a:'N',f:'Number of Stakeholders'}]},
  {name:'Expected Monetary Value (EMV)', eq:'EMV = Probability ├Ś Impact',                    cat:'risk', tip:'Used in decision tree analysis. Sum all EMVs for a branch to evaluate risk response options.',                                               vars:[{a:'EMV',f:'Expected Monetary Value'},{a:'P',f:'Probability (0ŌĆō1)'},{a:'I',f:'Impact ($)'}]},
  {name:'Point of Total Assumption (PTA)',eq:'PTA = ((CeilingŌłÆTarget)/Sharing%) + Target',   cat:'proc', tip:'In fixed-price-incentive contracts, PTA is where contractor absorbs 100% of cost overruns.',                                               vars:[{a:'PTA',f:'Point of Total Assumption'},{a:'CP',f:'Ceiling Price'},{a:'TP',f:'Target Price'}]},
  {name:'Present Value (PV formula)',    eq:'PV = FV / (1 + r)Ōü┐',                            cat:'cost', tip:'A dollar today is worth more than a dollar tomorrow. Used in project selection decisions.',                                                  vars:[{a:'PV',f:'Present Value'},{a:'FV',f:'Future Value'},{a:'r',f:'Interest Rate'},{a:'n',f:'Periods'}]},
  {name:'Net Present Value (NPV)',       eq:'NPV = ╬Ż PV of inflows ŌłÆ Cost',                  cat:'cost', tip:'Higher NPV = better project investment. Always select highest NPV when choosing between projects.',                                         vars:[{a:'NPV',f:'Net Present Value'},{a:'PV',f:'Present Value'}]},
  {name:'Return on Investment (ROI)',    eq:'ROI = (Benefit ŌłÆ Cost) / Cost ├Ś 100%',           cat:'cost', tip:'Used for project selection. Higher ROI = preferred. Compare projects on same timeline.',                                                    vars:[{a:'ROI',f:'Return on Investment'},{a:'B',f:'Benefit'},{a:'C',f:'Cost'}]},
  {name:'Benefit-Cost Ratio (BCR)',      eq:'BCR = Benefits / Costs',                         cat:'cost', tip:'BCR > 1 means benefits exceed costs. Used in project selection and procurement decisions.',                                                 vars:[{a:'BCR',f:'Benefit-Cost Ratio'},{a:'B',f:'Benefits'},{a:'C',f:'Costs'}]},
];

function renderCalculator(){

    ['CV','Cost Variance',       fmtCur(cv),  cv>=0],

      <div class="card-header">
        <i class="ti ti-chart-bar card-icon"></i>
        <div><div class="card-title">Computed Results</div><div class="card-sub">Color-coded: green = healthy, red = at risk</div></div>
      </div>
      ${rows.map(([abbr,lbl,val,good])=>`
        <div class="result-row">

/* ŌöĆŌöĆŌöĆ ACTIONS ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
function switchTab(id){ state.activeTab=id; render(); }

function selectFormula(i){
  state.activeFormula=i;
  document.querySelectorAll('.formula-row').forEach((el,idx)=>el.classList.toggle('active',idx===i));
  const detail=document.getElementById('formulaDetail');
  if(detail) detail.innerHTML=renderFormulaDetail(i);
}

function updateEV(k,v){ state.ev[k]=v; render(); }

function answerQuiz(selected){
  if(state.quizAnswered)return;
  state.quizAnswered=true;
  const q=QUIZ_QUESTIONS[state.quizIdx];
  if(selected===q.ans)state.quizScore++;
  document.querySelectorAll('.quiz-opt').forEach((el,i)=>{
    el.disabled=true;
    if(i===q.ans)el.classList.add('correct');
    else if(i===selected)el.classList.add('wrong');
  });
  const fb=document.getElementById('quizFeedback');
  if(fb) fb.innerHTML=`<div class="quiz-feedback"><strong>Explanation:</strong> ${q.exp}</div>`;
  const nx=document.getElementById('quizNext');
  if(nx) nx.innerHTML=`<div class="btn-row"><button class="btn primary" onclick="nextQuestion()">${state.quizIdx<QUIZ_QUESTIONS.length-1?'Next Question Ōåō':'See Results'}</button></div>`;
}

function nextQuestion(){
  if(state.quizIdx<QUIZ_QUESTIONS.length-1){ state.quizIdx++; state.quizAnswered=false; render(); }
  else{ state.quizComplete=true; render(); }
}

function restartQuiz(){ state.quizIdx=0; state.quizScore=0; state.quizAnswered=false; state.quizComplete=false; render(); }

async function callClaude(userMsg) {
  const system = `You are an expert PMP exam tutor specializing in IT Project Management. You know all PMP formulas deeply: Earned Value Management (EV,PV,AC,CV,SV,CPI,SPI,EAC,ETC,VAC,TCPI), PERT, Critical Path, Communication Channels, EMV, financial metrics (NPV, ROI, BCR, PV). Give concise, exam-focused answers. Use specific numbers and examples from IT projects. Keep responses under 200 words unless explaining complex topics.`;

  const msgs = state.aiMessages.map(m => ({
    role: m.role === 'ai' ? 'assistant' : 'user',
    content: m.text
  }));
  msgs.push({ role: 'user', content: userMsg });

    const resp = await fetch('/.netlify/functions/claude',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system,messages:msgs})
  });
  const data = await resp.json();
  return data.content.map(c=>c.text||'').join('');
async function askAI(msg){
  state.activeTab='ai';
  state.aiMessages.push({role:'user',text:msg});
  state.aiLoading=true;
  render();
  const body=document.getElementById('aiBody');
  if(body)body.scrollTop=body.scrollHeight;
  try{
    const reply=await callClaude(msg);
    state.aiMessages.push({role:'ai',text:reply});
  }catch(e){
    state.aiMessages.push({role:'ai',text:'Sorry, I had trouble connecting to the AI. Please check your API access and try again.'});
  }
  state.aiLoading=false;
  render();
  const b=document.getElementById('aiBody');
  if(b)b.scrollTop=b.scrollHeight;
}
